
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: movie_ticket_app
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3109:3000"
    environment:
      DATABASE_URL: postgres://app_user:app_password@postgres:5432/movie_ticket_app
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "8089:80"

volumes:
  db-data: