
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: swiggy_db
      POSTGRES_USER: swiggy_user
      POSTGRES_PASSWORD: swiggy_password
    volumes:
      - swiggy_postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3107:3000"
    environment:
      DATABASE_URL: postgres://swiggy_user:swiggy_password@postgres/swiggy_db
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "8087:80"

volumes:
  swiggy_postgres_data: