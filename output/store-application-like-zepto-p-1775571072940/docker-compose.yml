
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: zepto_db
      POSTGRES_USER: zepto_user
      POSTGRES_PASSWORD: zepto_password
    volumes:
      - zepto_postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3105:3000"
    environment:
      DATABASE_URL: postgres://zepto_user:zepto_password@postgres:5432/zepto_db
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "8085:80"

volumes:
  zepto_postgres_data: