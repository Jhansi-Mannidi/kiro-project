version: '3'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: movie_tickets_db
      POSTGRES_USER: movie_tickets_user
      POSTGRES_PASSWORD: movie_tickets_password
    volumes:
      - movie_tickets_postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://movie_tickets_user:movie_tickets_password@postgres:5432/movie_tickets_db
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "80:80"

volumes:
  movie_tickets_postgres_data: