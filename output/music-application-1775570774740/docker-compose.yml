
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: music_app_db
      POSTGRES_USER: music_app_user
      POSTGRES_PASSWORD: password123
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3104:3000"
    environment:
      DATABASE_URL: postgres://music_app_user:password123@postgres:5432/music_app_db
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "8084:80"

volumes:
  db-data: