
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ticket_booking_db
      POSTGRES_USER: ticket_booking_user
      POSTGRES_PASSWORD: ticket_booking_password
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3109:3000"
    environment:
      DATABASE_URL: postgres://ticket_booking_user:ticket_booking_password@postgres:5432/ticket_booking_db
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "8089:80"

volumes:
  db-data: