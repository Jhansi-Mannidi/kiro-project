
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bus_tickets_db
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_password
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3102:3000"
    environment:
      DATABASE_URL: postgres://db_user:db_password@postgres:5432/bus_tickets_db
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "8082:80"