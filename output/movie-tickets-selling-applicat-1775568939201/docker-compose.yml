
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: movie_tickets_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - movie_tickets_postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3101:3000"
    environment:
      DATABASE_URL: postgres://root:password@postgres:5432/movie_tickets_db
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "8081:80"

volumes:
  movie_tickets_postgres_data: