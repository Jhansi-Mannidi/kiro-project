
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bookmyshow_db
      POSTGRES_USER: bookmyshow_user
      POSTGRES_PASSWORD: bookmyshow_password
    volumes:
      - bookmyshow_postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3109:3000"
    environment:
      DATABASE_URL: postgres://bookmyshow_user:bookmyshow_password@postgres:5432/bookmyshow_db
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "8089:80"

volumes:
  bookmyshow_postgres_data: