
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bookstore
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: password
    volumes:
      - bookstore-postgres-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3102:3000"
    environment:
      DATABASE_URL: postgres://bookstore:password@postgres:5432/bookstore
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "8082:80"

volumes:
  bookstore-postgres-data: